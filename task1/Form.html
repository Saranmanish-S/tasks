<!DOCTYPE html>
<html lang="en">
<head>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Form Validation</h1>
   
    <form id="myForm" onsubmit="return validateForm(event)">
        
        <label for="fname">First name :</label> <input type="text" name="fname" id="fname" placeholder="Enter first name"><br>
        <label for="lname">Last name:</label> <input type="text" name="lname" id="lname" placeholder="Enter Last name"><br>
        <label for="email">Email id:</label> <input type="email" name="email" id="email" placeholder="Enter email"><br>
        <label for="pass">Password:</label> <input type="password" name="pass" id="pass" placeholder="Enter valid password"><br>
        <label for="dob">Date of Birth:</label> <input type="date" name="dob" id="dob" required><br>
        <input type="submit" value="Submit">
        
    </form>
   
    <script src="script.js"></script>
</body>
</html>
